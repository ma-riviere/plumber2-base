# Build both service images, push to GHCR, then deploy through the
# deploy-server contract (push-compose + deploy over the forced-command SSH
# key; the server health-gates the rollout with `docker compose up --wait`).
# Rollback = dispatch with a previous commit SHA as image_tag: the builds are
# skipped and that exact image pair is redeployed.
name: Deploy

on:
  push:
    branches:
      - main
    # md-only pushes would rebuild + redeploy identical images.
    paths-ignore:
      - '**.md'
  # Empty image_tag rebuilds and deploys HEAD (e.g. after a scheduled
  # base-image refresh); a previous commit SHA rolls back without rebuilding.
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing image tag to deploy (leave empty to build from the current commit)
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-plumber2-base
  cancel-in-progress: false

jobs:
  build:
    # Skipped on rollback dispatches: the requested tag already exists on GHCR.
    if: ${{ inputs.image_tag == '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [back, front]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/ma-riviere/plumber2-base-${{ matrix.service }}:${{ github.sha }}
          # Read-scoped PAT for the private auth0r GitHub install during renv restore
          secrets: |
            github_pat=${{ secrets.GH_PAT_AUTH0R }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Run after a successful build, or without one on rollback dispatches.
    if: ${{ !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # DEPLOY_KNOWN_HOSTS carries the host keys pinned on the trusted dev
      # machine (deploy-server ansible/known_hosts). Never replace this with
      # ssh-keyscan at deploy time: that trusts whoever answers on the network.
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Push compose file
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          sed "s|\${IMAGE_TAG:-local}|${INPUT_TAG:-${GITHUB_SHA}}|g" deploy/compose.yml \
            | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p "${{ secrets.DEPLOY_PORT }}" \
              "deploy@${{ secrets.DEPLOY_HOST }}" push-compose

      - name: Deploy app
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p "${{ secrets.DEPLOY_PORT }}" \
            "deploy@${{ secrets.DEPLOY_HOST }}" deploy
